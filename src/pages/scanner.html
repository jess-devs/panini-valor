<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
        <title>Escáner · Mi Postal</title>
        <meta name="description" content="Escaneá figuritas del álbum Panini FIFA World Cup 2026 para identificar jugadores." />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />

        <link rel="stylesheet" href="../css/tokens.css" />
        <link rel="stylesheet" href="../css/scanner.css" />
        <meta name="theme-color" content="#ffffff" />

        <!-- PapaParse — requerido por data.js -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
        <!-- Tesseract.js OCR desde CDN -->
        <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    </head>

    <body>
        <!-- ── Header ──────────────────────────────── -->
        <header class="page-header">
            <a href="../app.html" class="page-header-brand" aria-label="Ir a Mi Postal">
                <picture>
                    <source srcset="../assets/2026_FIFA_World_Cup_emblem.svg.avif" type="image/avif" />
                    <source srcset="../assets/2026_FIFA_World_Cup_emblem.svg.webp" type="image/webp" />
                    <img src="../assets/2026_FIFA_World_Cup_emblem.svg.webp" alt="" width="26" height="26" />
                </picture>
                <span class="page-header-title">Mi Postal <span>Mundial 2026</span></span>
            </a>
            <a href="../app.html" class="page-header-back">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
                Volver
            </a>
        </header>

        <!-- ── Main ────────────────────────────────── -->
        <main class="scanner-main">

            <div>
                <h1 class="scanner-title">Escáner de figuritas</h1>
                <p class="scanner-desc">Fotografiá o subí imágenes de tus figuritas para identificar jugadores y agregarlos a tu lista</p>
            </div>

            <!-- Estado de inicialización -->
            <div id="init-status" class="init-status" hidden>
                <div class="init-spinner" aria-hidden="true"></div>
                <span id="init-msg">Cargando…</span>
            </div>

            <!-- Tabs -->
            <div class="scanner-tabs" role="tablist" aria-label="Modo de escaneo">
                <button
                    role="tab"
                    aria-selected="true"
                    aria-controls="tab-individual"
                    id="btn-individual"
                    class="tab-btn tab-btn--active"
                    data-tab="individual"
                    type="button"
                >
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                        <circle cx="12" cy="13" r="4"/>
                    </svg>
                    Individual
                </button>
                <button
                    role="tab"
                    aria-selected="false"
                    aria-controls="tab-masivo"
                    id="btn-masivo"
                    class="tab-btn"
                    data-tab="masivo"
                    type="button"
                >
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect x="3" y="3" width="7" height="7" rx="1"/>
                        <rect x="14" y="3" width="7" height="7" rx="1"/>
                        <rect x="14" y="14" width="7" height="7" rx="1"/>
                        <rect x="3" y="14" width="7" height="7" rx="1"/>
                    </svg>
                    Masivo
                </button>
            </div>

            <!-- ── Tab Individual ──────────────────── -->
            <section id="tab-individual" role="tabpanel" aria-labelledby="btn-individual" class="tab-panel">

                <div class="camera-wrap">
                    <video id="preview" autoplay playsinline muted aria-hidden="true"></video>
                    <div class="camera-guide" aria-hidden="true"></div>
                    <div id="camera-unavailable" class="camera-unavailable" hidden>
                        <div class="cam-error-icon" aria-hidden="true">
                            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                                <circle cx="12" cy="13" r="4"/>
                                <line x1="2" y1="2" x2="22" y2="22"/>
                            </svg>
                        </div>
                        <p class="cam-error-title">Sin acceso a la cámara</p>
                        <p id="camera-error-msg" class="cam-error-body">Cámara no disponible</p>
                        <button type="button" id="camera-retry-btn" class="cam-retry-btn">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <polyline points="23 4 23 10 17 10"/>
                                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                            </svg>
                            Reintentar
                        </button>
                    </div>
                </div>

                <button id="capture-btn" class="btn-capture" type="button" disabled aria-label="Capturar figurita">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                    </svg>
                    Capturar figurita
                </button>

                <div id="individual-status" class="status-msg" role="status" aria-live="polite" hidden></div>

            </section>

            <!-- ── Tab Masivo ──────────────────────── -->
            <section id="tab-masivo" role="tabpanel" aria-labelledby="btn-masivo" class="tab-panel" hidden>

                <div id="drop-zone" class="drop-zone">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    <p class="drop-zone-text">Arrastrá fotos aquí o</p>
                    <button type="button" id="file-pick-btn" class="drop-zone-btn">
                        elegí archivos
                    </button>
                    <p class="drop-zone-hint">JPG, PNG, WEBP — podés subir múltiples fotos</p>
                </div>

                <input type="file" id="file-input" multiple accept="image/*" hidden aria-hidden="true" />

                <div id="batch-thumbs" class="batch-thumbs" role="list" aria-label="Imágenes procesadas"></div>

                <div id="batch-progress" class="batch-progress" hidden>
                    <progress id="batch-bar" value="0" max="100" aria-label="Progreso del procesamiento"></progress>
                    <p id="batch-status" class="batch-status-text" aria-live="polite"></p>
                </div>

                <div id="batch-summary" class="batch-summary" hidden aria-live="polite"></div>

            </section>

            <!-- Canvas oculto para preprocesamiento OCR -->
            <canvas id="offscreen-canvas" hidden aria-hidden="true"></canvas>

        </main>

        <!-- ── Toast ────────────────────────────── -->
        <div id="ocr-toast" class="ocr-toast" popover="manual" role="status" aria-live="polite">
            <span id="ocr-toast-msg" class="toast-msg"></span>
            <button
                type="button"
                class="toast-close"
                popovertarget="ocr-toast"
                popovertargetaction="hide"
                aria-label="Cerrar"
            >
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>

        <script type="module" src="../js/scanner.js"></script>
    </body>
</html>
